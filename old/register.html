<body>
    <!--! ================================================================ !-->
    <!--! [Start] Main Content !-->
    <!--! ================================================================ !-->
    <main class="auth-minimal-wrapper">
        <div class="auth-minimal-inner">
            <div class="minimal-card-wrapper">
                <div class="card mb-4 mt-5 mx-4 mx-sm-0 position-relative">
                    <div class="card-body p-sm-5">
                        <img src="assets/images/logo/logo-sm.png" alt="" style="width: 100px; height: 100px;">
                        <h2 class="fs-20 fw-bolder mt-4 mb-4">Registrasi</h2>
                        <!-- <h4 class="fs-13 fw-bold mb-2">Manage all your Duralux crm</h4> -->
                        <p class="fs-12 fw-medium text-muted">pastikan data yang anda inputkan bernar.</p>
                        <form action="index.html" class="w-100 mt-4 pt-2">
                            <div class="mb-4">
                                <input type="text" class="form-control" placeholder="Nomor Telepon" required>
                            </div>
                            <div class="mb-4">
                                <input type="text" class="form-control" placeholder="Nama Lengkap" required>
                            </div>
                            <div class="mb-4">
                                <select class="form-control" data-select2-selector="city">
                                    <option selected disabled>Kategori</option>
                                    <option>Nelayan</option>
                                    <option>Petani</option>
                                    <option>UMKM</option>
                                </select>
                            </div>
                            <div class="mb-4 generate-pass">
                                <div class="input-group field">
                                    <input type="password" class="form-control password" id="newPassword" placeholder="Password">
                                    <div class="input-group-text border-start bg-gray-2 c-pointer show-pass" data-bs-toggle="tooltip" title="Show/Hide Password"><i></i></div>
                                </div>
                            </div>
                            <div class="mb-4">
                                <input type="password" class="form-control" placeholder="Ulang Password" required>
                            </div>
                            <div class="mt-4">
                                <a href="login.html" class="btn btn-lg btn-primary w-100">Buat Akun</a>
                            </div>
                        </form>
                        <div class="mt-5 text-muted">
                            <span>Sudah memiliki akun?</span>
                            <a href="login.html" class="fw-bold">Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
